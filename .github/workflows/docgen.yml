name: Update Documentation
on:
  push:
    branches: [main, master]
    paths-ignore: ['docs/**', 'README.md']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install docgen
         run: npm install -g docgen-ai

      - name: Generate documentation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: docgen generate .

      - name: Commit updated docs
        run: |
          git diff --quiet docs/ README.md && exit 0
          git config user.name "docgen[bot]"
          git config user.email "docgen[bot]@users.noreply.github.com"
          git add docs/ README.md
          git commit -m "docs: auto-update documentation [skip ci]"
          git push
